name: CI/CD SmartLogix Frontend

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build y Push imagen Frontend
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/smartlogix-frontend:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/smartlogix-frontend:latest

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Desplegar en EC2 Web vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_WEB_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":[
            "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/smartlogix-frontend:latest",
            "docker stop smartlogix-frontend || true",
            "docker rm smartlogix-frontend || true",
            "docker run -d --name smartlogix-frontend -p 80:80 --restart always ${{ secrets.DOCKERHUB_USERNAME }}/smartlogix-frontend:latest"
          ]}' \
          --output text

